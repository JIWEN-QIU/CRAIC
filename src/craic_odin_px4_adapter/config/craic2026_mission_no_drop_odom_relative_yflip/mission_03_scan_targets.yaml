mission_segment: scan_image_targets
coordinate_frame: odom_relative
publish_frame_expected: odom
transform_already_applied: true

scan_policy:
  route_type: snake
  stop_after_found_all_qr_targets: false
  no_drop_version: false
  descend_for_drop: true
  drop_enabled: true
  per_waypoint_inference: true
  cruise_z: 1.35
  detect_z: 0.42
  drop_z: 0.14
  infer_launch: "roslaunch uav_4class_infer uav_4class.launch"
  infer_result_topic: /target_info
  infer_timeout: 10.0
  completion_after_each_waypoint:
    - "到达目标点上方"
    - "下降到 0.42m 识别"
    - "启动 uav_4class_infer/uav_4class.launch"
    - "若 10 秒内识别结果匹配需求，则下降到 0.14m 投放"
    - "若 10 秒内没有匹配需求，则回到 1.35m 后前往下一个目标点"
    - "第 3/4 点保底投放也遵循 0.42m 识别 -> 0.14m 投放路线"
    - "任务三累计完成 2 次投放后，回到 1.35m 即视为任务三完成并进入任务四"

waypoints:
  - id: image_top_left
    point: [3.5, -1.56, 1.35]
    action: classify_image_target
    hold_time: 0.0
    yaw: null

  - id: image_top_right
    point: [1.7, -1.56, 1.35]
    action: classify_image_target
    hold_time: 0.0
    yaw: null

  - id: image_bottom_right
    point: [1.7, 1.64, 1.35]
    action: classify_image_target
    hold_time: 0.0
    yaw: null

  - id: image_bottom_left
    point: [3.5, 1.64, 1.35]
    action: classify_image_target
    hold_time: 0.0
    yaw: null

completion:
  type: per_waypoint_descend_infer
  final_waypoint: image_bottom_left
  final_hold_time: 0.0
  perception_required: true
  infer_timeout: 10.0
  note: "每个图片靶点到达后下降到 0.42m 识别，启动 uav_4class_infer/uav_4class.launch，若 10 秒内识别结果匹配需求，则下降到 0.14m 投放后回到 1.35m；若 10 秒内没有匹配需求，则直接回到 1.35m 前往下一个点。第 3/4 点保底投放也必须先经过 0.42m 识别，再下降到 0.14m 投放。任务三累计完成 2 次投放后，回到 1.35m 即视为任务三完成并进入任务四；否则最后一个点完成同样流程后任务完成，不再停留 2 秒。"
