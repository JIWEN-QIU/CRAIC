#########################################################################
# ⭐⭐⭐  Set parameters carefully for satisfied performance!   ⭐⭐⭐ #
#########################################################################

ctrl_freq_max   : 100.0
manual_ctrl_mode: 1  # 0: hover-pose integration based, 1: simple position control based
max_manual_vel: 1.0
max_manual_vel_z: 0.8
max_manual_yaw_rate: 1.5
manual_ctrl_lookahead_time: 0.5  # Only used when manual_ctrl_mode=1

rc_reverse: # *
    roll: false
    pitch: false
    yaw: false
    throttle: false

auto_takeoff_land:
    enable: true
    enable_auto_arm: true
    no_RC: false
    takeoff_height: 1.6 # m
    takeoff_land_speed: 0.3 # m/s

msg_timeout:
    odom: 0.5
    rc:   0.5
    cmd:  0.5

battery:
    series: 6                    # 电池串联数 (例如: 6S电池)
    cell_full_voltage: 4.2       # 单电芯满电电压 (V)
    cell_cutoff_voltage: 3.3     # 单电芯截止电压 (V)
