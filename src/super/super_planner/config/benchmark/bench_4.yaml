fsm_node:
  fsm:
    swarm_en: false
    bench_en: true
    auto_pilot_en: false
    click_goal_en: true
    odom_goal_en: false
    #    odom_goal_topic: "/odom_goal"
    click_goal_topic: "/goal"
    #    click_goal_topic: "/planning/click_goal"
    path_goal_topic: "/planning/path_goal"
    replan_rate: 15.0
    auto_pilot_speed: 3.0
    auto_pilot_yaw_speed: 1.0
    click_height: -999
    # if use the yaw ange in /goal as the goal yaw direction
    click_yaw_en: false
    cmd_topic: "/planning/pos_cmd"
    #    cmd_topic: "/quad_1/planning/pos_cmd"
    # mpc_cmd_type: 1 for PVAJ, 2 for poly traj
    mpc_cmd_type: 1
    mpc_cmd_topic: "/planning_cmd/mpc"
  #    mpc_cmd_topic: "/planning_cmd/poly_traj"


  super_planner:
    print_log: false
    frontend_in_known_free: false
    goal_vel_en: false
    visual_process: false
    use_fov_cut: false
    # 走廊生成的上限Bounding Box
    corridor_bound_dis: 1.2
    corridor_line_max_length: 1.2
    safe_corridor_line_max_length: 4.0
    iris_iter_num: 2
    obs_skip_num: 2
    # Replan时往前看多少秒
    replan_forward_dt: 0.1
    planning_horizon: 10
    receding_dis: 1.0
    # [WARN] the robot r should equal to decaymap resolution[0] * infalate dis.
    robot_r: 0.2
    yaw_dot_max: 1.5
    # Yaw mode: 1 heading to velocity, 2 heading to goal
    yaw_mode: 1


  traj_opt:
    swarm:
      enable: false
      swarm_clearance: -1
      penna_swarm: -1

    switch:
      save_log_en: false

    flatness:
      mass: 1.64
      dh: 0.35
      dv: 0.35
      cp: 0.001
      v_eps: 0.0001
      grav: 9.81

    boundary:
      max_vel: 20.0
      max_acc: 20.0
      max_jerk: 200.0
      max_omg: 2.5
      max_acc_thr: 17.0
      min_acc_thr: 8.0
      penna_margin: 0.05

    exp_traj:
      # for swarm
      pos_constraint_type: 2
      piece_num: 1
      block_energy_cost: false
      opt_accuracy: 5.0e-6
      integral_reso: 15
      smooth_eps: 0.01
      penna_t: 1.0e+6
      penna_pos: 1.0e+9
      penna_vel: 5.0e+8
      penna_acc: 5.0e+8
      penna_jerk: -1.0e+6 #
      penna_attract: 5.0e+7
      penna_omg: -1.0e+11
      penna_thr: -1.0e+10

    backup_traj:
      # for swarm
      pos_constraint_type: 1
      piece_num: 2
      block_energy_cost: true
      opt_accuracy: 1.0e-6
      integral_reso: 12
      smooth_eps: 0.01
      penna_t: 1.0e+6
      penna_ts: 2.0e+6
      penna_pos: 1.0e+10
      penna_vel: 1.0e+8
      penna_acc: 2.0e+8
      penna_jerk: -1.0e+6 #
      penna_attract: -1.0e+10
      penna_omg: -1.0e+11
      penna_thr: -1.0e+10

  astar:
    map_voxel_num: [ 200, 200, 100 ]
    visual_process: false
    allow_diag: true
    # 0 DIAG; 1 MANHATTAN; 2 EUCLIDEAN
    heu_type: 2
    debug_visualization_en: false

  rog_map:
    load_pcd_en: false
    pcd_name: "output.pcd"
    safe_margin: 0.25
    resolution: 0.05
    inflation_resolution: 0.15
    inflation_step: 3
    map_size: [ 13,110,8 ]
    fix_map_origin: [ 0,0,3]
    # Virtual ceil and ground
    virtual_ceil_height: 3.5
    virtual_ground_height: 0.3


    map_sliding:
      enable: false
      # The minimum distance [m] to slide the map.
      threshold: 1.0
      # If the map rolling is disable, the map origin [m] should be set.


    frontier_extraction_en: false

    # If [enbale = true], the ROG-Map will actively take ros topic as input.
    #  else user should call function [updateMap] to update the map.
    ros_callback:
      enable: true
      cloud_topic: "/cloud_registered"
      odom_topic: "/lidar_slam/odom"
      #      odom_topic: "/mavros/local_position/odom"
      odom_timeout: 2.0

    visulization:
      enbale: true
      # The rate of visualization [Hz], if set to 0, the visualization will not be triggered by frame.
      time_rate: 2
      # The frame rate of visualization [Hz], if set to 0, the visualization will not be triggered by frame.
      frame_rate: 0
      # visualization range along the odom [m].
      range: [ 35, 35, 5 ]
      frame_id: "world"
      pub_unknown_map_en: false

    # Intensity filter for input point cloud. If the point intensity is less than this value,
    # it will be ignored (to avoid noise like dusk).
    intensity_thresh: -10
    # The temporal downsample rate for input point cloud.
    #  e.g. if set to k, the point cloud will be downsampled to 1/k.
    point_filt_num: 4

    # Probabilistc update
    raycasting:
      # if disable, the map will only maintain occupied information, and all other grid
      # will be considered as unknown.
      enable: false
      batch_update_size: 1
      local_update_box: [ 150, 150, 50 ]
      # The range of raycasting [m].
      ray_range: [ 0.5, 50 ]

      p_min: 0.12
      p_miss: 0.4999
      p_free: 0.4999999
      p_occ: 0.8
      p_hit: 0.9
      p_max: 0.98
      # The threshold of a non-occupied inf map grid to be considered as free. [0.0-1.0]
      # which means for a gird contains [u] unknown grids and [f] known free grids.
      # if [f/(f+u) > inf_map_known_free_thresh], the grid will be considered as free.
      #  e.g. this thresh is set to 1.0, it measn a inf map grid is considered as free only if all grids in it are known free.
      inf_map_known_free_thresh: 0.5