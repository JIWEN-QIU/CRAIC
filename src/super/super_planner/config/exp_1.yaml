# fsm_node:
fsm:
  click_goal_topic: "/planning/next_viewpoint"
  replan_rate: 5.0
  click_yaw_en: true
  cmd_topic: "/position_cmd"
  # mpc_cmd_type: 1 for PVAJ, 2 for poly traj
  mpc_cmd_type: 2
  #    mpc_cmd_topic: "/planning_cmd/mpc"
  mpc_cmd_topic: "/planning_cmd/poly_traj"

super_planner:
  frontend_in_known_free: true
  goal_yaw_en: true
  corridor_bound_dis: 1.2 # edited 0507, original: 1.5
  corridor_line_max_length: 1.5
  safe_corridor_line_max_length: 8.0
  planning_horizon: 8
  receding_dis: 2
  # [WARN] the robot r should equal to decaymap resolution[0] * infalate dis.
  robot_r: 0.25
  yaw_dot_max: 3.0
  # Yaw mode: 1 heading to velocity, 2 heading to goal
  yaw_mode: 1


traj_opt:
  boundary:
    max_vel: 5.0
    max_acc: 5.0
    max_jerk: 120.0
    max_omg: 2.5
    max_acc_thr: 17.0
    min_acc_thr: 6.0
    penna_margin: 0.05

  exp_traj:
    opt_accuracy: 2.0e-6
    penna_scale: 1.0e+4
    penna_t: 1.5
    penna_pos: 100
    penna_vel: 10
    penna_acc: 10
    penna_jerk: 10
    penna_attract: 10
    penna_omg: 10
    penna_thr: 10

  backup_traj:
    penna_scale: 1.0e+4
    penna_t: 1.0
    penna_ts: 10.0
    penna_pos: 1000.0
    penna_vel: 10.0
    penna_acc: 10.0
    penna_jerk: -1
    penna_attract: -1
    penna_omg: 10
    penna_thr: 10

astar:
  map_voxel_num: [ 500, 500, 100 ]
  visual_process: false
  allow_diag: true
  # 0 DIAG; 1 MANHATTAN; 2 EUCLIDEAN
  heu_type: 2
  debug_visualization_en: false

rog_map:
  # resolution: 0.1
  # inflation_resolution: 0.3
  # inflation_step: 1
  # resolution: 0.05
  # inflation_resolution: 0.2
  # inflation_step: 2
  resolution: 0.06
  inflation_resolution: 0.18
  inflation_step: 2
  block_inf_pt: false
  map_size: [ 50,50,30 ]
  fix_map_origin: [ 0,0,0 ]
  # all
  boundingbox_min: [ -52,-130,-1.0]
  boundingbox_max: [ 40,80,3.0 ]
  # # not use
  # boundingbox_min: [ -10,-20,-8]
  # boundingbox_max: [ 120,80,20 ]
  # # not use
  # boundingbox_min: [ 0,-50,-8]
  # boundingbox_max: [ 120,5,20 ]
  # # simple complex
  # boundingbox_min: [ -7, -2, -5 ]
  # boundingbox_max: [ 14, 47, 8 ]
  # # big complex
  # boundingbox_min: [ -20, -60, -8 ]
  # boundingbox_max: [ 120, 100, 8 ]
  # # simple map
  # boundingbox_min: [ -30, -30, -5 ]
  # boundingbox_max: [ 30, 30, 7 ]
  # Virtual ceil and ground
  virtual_ceil_height: 999
  virtual_ground_height: -999

  # If [enbale = true], the ROG-Map will actively take ros topic as input.
  #  else user should call function [updateMap] to update the map.
  ros_callback:
    enable: true
    cloud_topic: "cloud"
    odom_topic: "odom"
    #      odom_topic: "/mavros/local_position/odom"
    odom_timeout: 2.0

  swarm_en: true
  drone_id: 1
  drone_num: 5
  other_traj_topics: "/current_traj_"

  map_sliding:
    enable: false
    # The minimum distance [m] to slide the map.
    threshold: 0.9
    # If the map rolling is disable, the map origin [m] should be set.


  visulization:
    enbale: true
    # The rate of visualization [Hz], if set to 0, the visualization will not be triggered by frame.
    time_rate: 2
    # The frame rate of visualization [Hz], if set to 0, the visualization will not be triggered by frame.
    frame_rate: 0
    # visualization range along the odom [m].
    range: [ 10, 10, 5 ]
    frame_id: "world"
    pub_unknown_map_en: true

  # Intensity filter for input point cloud. If the point intensity is less than this value,
  # it will be ignored (to avoid noise like dusk).
  # intensity_thresh: 2
  # The temporal downsample rate for input point cloud.
  #  e.g. if set to k, the point cloud will be downsampled to 1/k.
  point_filt_num: 4

  # Probabilistc update
  raycasting:
    # if disable, the map will only maintain occupied information, and all other grid
    # will be considered as unknown.
    enable: true
    blind_filter_en: false

    batch_update_size: 1
    local_update_box: [ 30, 30, 20 ]
    # The range of raycasting [m].
    ray_range: [ 0.1, 15 ]

    p_min: 0.12
    p_miss: 0.49
    p_free: 0.45
    p_occ: 0.85
    p_hit: 0.99
    p_max: 0.98